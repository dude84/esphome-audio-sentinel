# ─────────────────────────────────────────────────────────────────────────────
# Audio Sentinel — ESP32-S3 + INMP441 audio monitor for Home Assistant.
#
# DEVICE / CONSUMER yaml. Pulls all reusable logic (packages + the audio_sentinel
# external component) from the public repo via github://, pinned to a tag.
# Secrets stay LOCAL here and are injected into the remote packages as
# substitutions (remote git packages cannot use !secret).
#
# For local development of the packages/component themselves, build
# audio-sentinel.dev.yaml instead (it includes them from this working tree).
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  name: audio-sentinel
  friendly_name: "SG Baby Audio Sentinel S3"
  device_description: "Audio Sentinel"

  # I²S wiring (INMP441)
  i2s_bclk: GPIO10
  i2s_lrclk: GPIO11
  i2s_din: GPIO04
  pin_led: GPIO21

  # Audio capture
  sample_rate: "16000"
  meas_duration_ms: "125"
  live_interval_ms: "250"

  # DSP tuning
  hysteresis_db: "1.5"
  initial_floor_db: "-60"
  floor_drift_db: "0.001"

  # Network
  static_ip: 192.0.2.50
  ap_ssid: "Sg-Baby-Audio-Sentinel-S3"

  # Secrets injected into the remote network package (kept local; never in the repo)
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ap_password: !secret ap_password
  api_key: !secret api_password
  ota_password: !secret ota_password

esphome:
  name: ${name}
  comment: ${device_description}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: INFO

# Reusable logic pulled from the public repo, pinned to a release tag.
external_components:
  - source: github://dude84/esphome-audio-sentinel@v1.1.0
    components: [audio_sentinel]

packages:
  network:     github://dude84/esphome-audio-sentinel/audio-sentinel/packages/network.yaml@v1.1.0
  mic:         github://dude84/esphome-audio-sentinel/audio-sentinel/packages/mic.yaml@v1.1.0
  sentinel:    github://dude84/esphome-audio-sentinel/audio-sentinel/packages/sentinel.yaml@v1.1.0
  diagnostics: github://dude84/esphome-audio-sentinel/audio-sentinel/packages/diagnostics.yaml@v1.1.0
