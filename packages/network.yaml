# Wi-Fi, API, OTA, captive portal, web server.
# Local package — may use !secret (only *remote git* packages forbid secrets).

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: NONE
  use_address: ${static_ip}
  ap:
    ssid: "Sg-Baby-Audio-Sentinel-S3"
    password: !secret ap_password
  on_connect:
    - light.turn_on:
        id: rgb
        brightness: 50%
        red: 0%
        green: 0%
        blue: 100%

captive_portal:

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_password

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - lambda: "id(sentinel).set_audio_enabled(false);"  # pause live updates during OTA
    on_end:
      then:
        - lambda: "id(sentinel).set_audio_enabled(true);"

web_server_base:
  id: web_base

web_server:
  port: 80
  version: 3
