# Wi-Fi, API, OTA, captive portal, web server.
# REMOTE-SAFE: no !secret here. Remote git packages forbid !secret, so secrets
# arrive as ${substitutions} that the consuming device yaml fills from !secret.
# Required substitutions: wifi_ssid wifi_password ap_ssid ap_password api_key
#                         ota_password static_ip

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: true
  power_save_mode: NONE
  use_address: ${static_ip}
  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}
  # (no on_connect LED automation — LED stays off; control it manually from HA)

captive_portal:

api:
  reboot_timeout: 0s
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_password}
    on_begin:
      then:
        - lambda: "id(sentinel).set_audio_enabled(false);"  # pause live updates during OTA
    on_end:
      then:
        - lambda: "id(sentinel).set_audio_enabled(true);"

web_server_base:
  id: web_base

web_server:
  port: 80
  version: 3
