<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1100" viewBox="0 0 1100 1100" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1100" height="1100" fill="#f4f4f4"/>

  <!-- ============ INMP441 mic ============ -->
  <rect x="120" y="70" width="440" height="240" rx="16" fill="#2e6f4e"/>
  <text x="340" y="118" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="bold">INMP441</text>
  <text x="340" y="148" text-anchor="middle" fill="#bfe3cd" font-size="18">I²S MEMS microphone</text>
  <circle cx="340" cy="212" r="30" fill="#173d29"/>
  <circle cx="340" cy="212" r="14" fill="#0c2418"/>

  <!-- mic pin pads (straddle bottom edge y=310) + labels -->
  <!-- Pins ordered left->right to match ESP pads top->bottom, so every wire is a
       simple down-then-right run with NO crossings:
       SD 165 / WS 235 / SCK 305 / GND 375 / VDD 445 / L/R 515 -->
  <rect x="154" y="300" width="22" height="22" rx="4" fill="#3fa757"/>
  <rect x="224" y="300" width="22" height="22" rx="4" fill="#4a90d9"/>
  <rect x="294" y="300" width="22" height="22" rx="4" fill="#f4b73f"/>
  <rect x="364" y="300" width="22" height="22" rx="4" fill="#222222"/>
  <rect x="434" y="300" width="22" height="22" rx="4" fill="#e8505b"/>
  <rect x="504" y="300" width="22" height="22" rx="4" fill="#ef8b3f"/>
  <text x="165" y="342" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">SD</text>
  <text x="235" y="342" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">WS</text>
  <text x="305" y="342" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">SCK</text>
  <text x="375" y="342" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">GND</text>
  <text x="445" y="342" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">VDD</text>
  <text x="515" y="342" text-anchor="middle" fill="#333333" font-size="17" font-weight="bold">L/R</text>

  <!-- ============ wires — down then right, each its own lane, no overlaps ====== -->
  <g fill="none" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <!-- SD  -> GPIO4 DIN -->
    <polyline points="165,322 165,758 540,758" stroke="#3fa757"/>
    <!-- WS  -> GPIO11 LRCLK -->
    <polyline points="235,322 235,716 540,716" stroke="#4a90d9"/>
    <!-- SCK -> GPIO10 BCLK -->
    <polyline points="305,322 305,674 540,674" stroke="#f4b73f"/>
    <!-- GND -> GND -->
    <polyline points="375,322 375,632 540,632" stroke="#222222"/>
    <!-- VDD -> 3.3V -->
    <polyline points="445,322 445,590 540,590" stroke="#e8505b"/>
    <!-- L/R -> 3.3V (selects right channel) -->
    <polyline points="515,322 515,590 540,590" stroke="#ef8b3f"/>
  </g>
  <!-- junction dot: VDD + L/R share 3.3V -->
  <circle cx="515" cy="590" r="5" fill="#222222"/>

  <!-- ============ ESP32-S3 ============ -->
  <rect x="560" y="520" width="420" height="300" rx="16" fill="#2b2d42"/>
  <!-- USB-C tab -->
  <rect x="715" y="506" width="110" height="16" rx="5" fill="#5a5d77"/>
  <text x="770" y="519" text-anchor="middle" fill="#e8e9f2" font-size="13" font-weight="bold">USB-C</text>
  <text x="770" y="552" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="bold">ESP32-S3</text>
  <text x="770" y="578" text-anchor="middle" fill="#aab0c6" font-size="17">DevKitC-1</text>

  <!-- left pads (wire tip at x=540) + labels -->
  <!-- 3V3 590 / GND 632 / GPIO10 674 / GPIO11 716 / GPIO4 758 -->
  <rect x="540" y="579" width="22" height="22" rx="4" fill="#e8505b"/>
  <rect x="540" y="621" width="22" height="22" rx="4" fill="#222222"/>
  <rect x="540" y="663" width="22" height="22" rx="4" fill="#f4b73f"/>
  <rect x="540" y="705" width="22" height="22" rx="4" fill="#4a90d9"/>
  <rect x="540" y="747" width="22" height="22" rx="4" fill="#3fa757"/>
  <text x="576" y="596" fill="#ffffff" font-size="18" font-weight="bold">3.3V <tspan fill="#aab0c6" font-weight="normal" font-size="14">(VDD + L/R)</tspan></text>
  <text x="576" y="638" fill="#ffffff" font-size="18" font-weight="bold">GND</text>
  <text x="576" y="680" fill="#ffffff" font-size="18" font-weight="bold">GPIO10 <tspan fill="#aab0c6" font-weight="normal" font-size="14">· BCLK → SCK</tspan></text>
  <text x="576" y="722" fill="#ffffff" font-size="18" font-weight="bold">GPIO11 <tspan fill="#aab0c6" font-weight="normal" font-size="14">· LRCLK → WS</tspan></text>
  <text x="576" y="764" fill="#ffffff" font-size="18" font-weight="bold">GPIO4 <tspan fill="#aab0c6" font-weight="normal" font-size="14">· DIN → SD</tspan></text>

  <!-- right pad: onboard LED, no wiring -->
  <rect x="958" y="747" width="22" height="22" rx="4" fill="#9b6dd6"/>
  <text x="948" y="758" text-anchor="end" fill="#ffffff" font-size="18" font-weight="bold">GPIO21</text>
  <text x="948" y="778" text-anchor="end" fill="#aab0c6" font-size="14" font-style="italic">onboard RGB LED (no wiring)</text>

  <!-- caption -->
  <text x="550" y="888" text-anchor="middle" fill="#777777" font-size="18">Audio Sentinel — ESP32-S3 + INMP441 I²S wiring · L/R → 3.3V selects the right channel · power via USB-C</text>
</svg>
